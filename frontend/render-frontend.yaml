services:
  # AetherOS Dashboard (Frontend)
  - type: web
    name: aetheros-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: RENDER_BACKEND_URL
        value: https://atheros.onrender.com
      - key: RENDER_API_KEY
        value: rnd_6yddB7j782tNWnxJH6Xe427BViKk # Shared Secret
